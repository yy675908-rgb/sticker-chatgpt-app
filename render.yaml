services:
  - type: web
    name: sticker-chatgpt-app
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: STICKER_ACCESS_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: sticker-chatgpt-db
          property: connectionString

databases:
  - name: sticker-chatgpt-db
    plan: free
    databaseName: stickers
    user: sticker_app
